BEGIN
  -- logic

END;
/</pre>

CREATE PROCEDURE proc_name (

  IN  p_name VARCHAR(200),

BEGIN
  DECLARE v_count INT DEFAULT 0;
  DECLARE EXIT HANDLER FOR SQLEXCEPTION
  BEGIN
    ROLLBACK;

  END;
  -- logic
  SET p_out = 'DONE';

END$$

BEGIN

$$;</pre>
